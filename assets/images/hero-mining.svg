  <circle cx="500" cy="120" r="1" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="800" cy="60" r="1.5" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="1100" cy="100" r="1" fill="#C8960C" opacity="0.7"/>
  <circle cx="1300" cy="70" r="1.5" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="350" cy="150" r="1" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="950" cy="90" r="1" fill="#FFFFFF" opacity="0.5"/>
</svg>
