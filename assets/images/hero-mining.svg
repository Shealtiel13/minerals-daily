  </defs>
  <rect width="1440" height="500" fill="url(#sky)"/>
  <!-- Mountains -->
  <polygon points="0,350 200,180 400,280 600,150 800,250 1000,170 1200,220 1440,300 1440,500 0,500" fill="#1a2a3a" opacity="0.8"/>
  <polygon points="0,400 300,250 500,320 700,200 900,300 1100,230 1440,350 1440,500 0,500" fill="#0f1a2a" opacity="0.9"/>
